<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排版建議小幫手 — 淨淨美學工作室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css">
<style>
.page-header{
  background:linear-gradient(135deg,var(--teal-xl) 0%,var(--white) 40%,var(--white) 60%,var(--teal-l) 100%);
  padding:40px 40px 32px;border-bottom:1px solid #EEF0F2;
}
.page-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.page-title{display:flex;align-items:center;gap:16px;}
.page-title .logo{
  width:48px;height:48px;border-radius:14px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:20px;
  box-shadow:0 4px 16px rgba(97,208,223,.3);
}
.page-title h1{font-size:24px;font-weight:900;color:var(--dark);}
.page-title .subtitle{font-size:13px;color:var(--gray);margin-top:2px;}
.back-link{
  font-size:13px;color:var(--gray);text-decoration:none;
  padding:8px 14px;border-radius:var(--radius-s);border:1px solid #EEF0F2;
  transition:all .2s;
}
.back-link:hover{color:var(--teal-d);border-color:var(--teal);}

.main{max-width:1200px;margin:0 auto;padding:32px 40px 80px;}

.form-card{background:var(--white);border:1px solid #EEF0F2;border-radius:var(--radius);padding:28px;margin-bottom:28px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:13px;font-weight:700;color:var(--dark);}
.form-field .hint{font-size:11px;color:var(--gray);}
.form-field input[type=text],
.form-field textarea,
.form-field select{
  font-family:inherit;font-size:14px;color:var(--text);
  padding:10px 12px;border:1px solid #E1E5E8;border-radius:10px;
  background:var(--white);outline:none;transition:border-color .2s;
}
.form-field input[type=text]:focus,
.form-field textarea:focus,
.form-field select:focus{border-color:var(--teal);}
.form-field textarea{min-height:72px;resize:vertical;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  font-size:13px;padding:7px 14px;border-radius:20px;
  background:var(--light-gray);border:1px solid #EEF0F2;color:var(--text);
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.chip:hover{border-color:var(--teal);color:var(--teal-d);}
.chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}

.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid #EEF0F2;}
.btn{background:var(--white);border:1px solid #EEF0F2;color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn:hover{border-color:var(--teal);color:var(--teal-d);}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700;}
.btn.primary:hover{background:var(--teal-d);border-color:var(--teal-d);color:#fff;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.section-label{font-size:13px;font-weight:700;color:var(--teal-d);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;padding-left:4px;}
.proposals{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.proposal{background:var(--white);border:1px solid #EEF0F2;border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;gap:14px;transition:all .25s ease;}
.proposal:hover{border-color:var(--teal);box-shadow:0 8px 32px rgba(97,208,223,.1);}
.p-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.p-tag{font-size:11px;font-weight:700;color:var(--teal-d);background:var(--teal-l);padding:4px 10px;border-radius:12px;letter-spacing:1px;}
.p-name{font-size:17px;font-weight:900;color:var(--dark);}
.p-oneliner{font-size:13px;color:var(--gray);line-height:1.6;}
.wireframe{background:#F4F6F8;border-radius:var(--radius-s);padding:16px;overflow:hidden;}
.wireframe svg{width:100%;height:auto;display:block;}
.p-block{font-size:13px;line-height:1.7;}
.p-block .label{font-size:11px;font-weight:700;color:var(--teal-d);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.p-block .content{color:var(--text);white-space:pre-wrap;}
.p-palette{display:flex;gap:6px;margin-top:4px;}
.p-swatch{width:24px;height:24px;border-radius:6px;border:1px solid rgba(0,0,0,.08);position:relative;cursor:pointer;}
.p-swatch[data-hex]::after{content:attr(data-hex);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'Inter',monospace;color:var(--gray);white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;}
.p-swatch:hover::after{opacity:1;}
.p-actions{display:flex;gap:8px;margin-top:auto;padding-top:14px;border-top:1px solid #EEF0F2;}
.btn-small{font-size:12px;padding:6px 12px;border-radius:8px;background:var(--white);border:1px solid #EEF0F2;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-small:hover{border-color:var(--teal);color:var(--teal-d);}

.state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray);font-size:14px;}
.state.loading{display:flex;flex-direction:column;align-items:center;gap:12px;}
.state .dots{display:flex;gap:6px;}
.state .dots span{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:lBounce 1.2s infinite ease-in-out;}
.state .dots span:nth-child(2){animation-delay:.15s;}
.state .dots span:nth-child(3){animation-delay:.3s;}
@keyframes lBounce{0%,60%,100%{transform:scale(.7);opacity:.4;}30%{transform:scale(1);opacity:1;}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:1000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:680px){
  .page-header{padding:24px 20px;}
  .main{padding:24px 20px 60px;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="page-header">
  <div class="page-header-inner">
    <div class="page-title">
      <div class="logo">淨</div>
      <div>
        <h1>排版建議小幫手</h1>
        <div class="subtitle">輸入活動主題與版位，AI 幫你想 3 個起跑方向</div>
      </div>
    </div>
    <a href="index.html" class="back-link">← 返回工作室</a>
  </div>
</header>

<main class="main">

  <div class="form-card">
    <div class="section-label">活動設定</div>
    <div class="form-grid">
      <div class="form-field full">
        <label>活動主題 / 素材用途</label>
        <input type="text" id="topic" placeholder="例：母親節感恩優惠、新品洗衣精上市、夏日大掃除季" value="母親節感恩優惠">
        <span class="hint">具體越好，AI 越能抓到調性</span>
      </div>

      <div class="form-field">
        <label>目標版位</label>
        <select id="platform">
          <option value="Shopline 官網首頁 Banner (1920×600)">Shopline 官網首頁 Banner (1920×600)</option>
          <option value="Shopline APP 首頁 (750×750)">Shopline APP 首頁 (750×750)</option>
          <option value="IG 貼文 (1080×1080)">IG 貼文 (1080×1080)</option>
          <option value="IG 限動 / Reels (1080×1920)">IG 限動 / Reels (1080×1920)</option>
          <option value="FB 粉絲團貼文 (1200×630)">FB 粉絲團貼文 (1200×630)</option>
          <option value="蝦皮商品主圖 (1024×1024)">蝦皮商品主圖 (1024×1024)</option>
          <option value="Momo 商城 Banner (1000×500)">Momo 商城 Banner (1000×500)</option>
          <option value="LINE 推播 (1040×520)">LINE 推播 (1040×520)</option>
        </select>
      </div>

      <div class="form-field">
        <label>調性 / 情緒</label>
        <div class="chip-row" id="tone-row">
          <button type="button" class="chip on" data-tone="感恩溫馨">感恩溫馨</button>
          <button type="button" class="chip" data-tone="促銷急迫">促銷急迫</button>
          <button type="button" class="chip" data-tone="知識科普">知識科普</button>
          <button type="button" class="chip" data-tone="新品上市">新品上市</button>
          <button type="button" class="chip" data-tone="日常使用">日常使用</button>
          <button type="button" class="chip" data-tone="節慶氛圍">節慶氛圍</button>
        </div>
      </div>

      <div class="form-field full">
        <label>必放元素（選填）</label>
        <textarea id="must-have" placeholder="例：淨淨 Logo、椰油洗衣精產品圖、「以家人標準開發」slogan、SGS 認證標章"></textarea>
        <span class="hint">AI 會把這些元素排進版面配置建議裡</span>
      </div>

      <div class="form-field full">
        <label>補充需求（選填）</label>
        <textarea id="extra" placeholder="例：需強調節日折扣、要有 CTA 按鈕、限 3 色內、避免過滿"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" id="btn-reset" type="button">重設</button>
      <button class="btn primary" id="btn-generate" type="button">產出 3 個方案 →</button>
    </div>
  </div>

  <div class="section-label" id="results-label" style="display:none;">AI 建議方案</div>
  <div class="proposals" id="proposals"></div>

</main>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const toneRow = $('#tone-row');
let selectedTone = '感恩溫馨';
toneRow.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  toneRow.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
  c.classList.add('on');
  selectedTone = c.dataset.tone;
}));

function parsePlatformSize(str){
  const m = str.match(/\((\d+)\s*[×x]\s*(\d+)\)/);
  return m ? { w: +m[1], h: +m[2], label: str } : { w: 1920, h: 600, label: str };
}

function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

window.__ccCurrentProposals = null;

function getFormState(){
  return {
    topic: $('#topic').value.trim(),
    platform: $('#platform').value,
    tone: selectedTone,
    mustHave: $('#must-have').value.trim(),
    extra: $('#extra').value.trim(),
  };
}

function escapeXml(s){
  return String(s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
}

function renderWireframe(p, canvasW, canvasH){
  const ratio = canvasW / canvasH;
  const vbW = 400;
  const vbH = Math.round(vbW / ratio);
  const bg = (p.palette && p.palette[0]) || '#F4FBFC';
  const accent = (p.palette && p.palette[1]) || '#61D0DF';
  const dark = (p.palette && p.palette[2]) || '#2D3142';

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const blocks = (p.blocks || []).map(b => {
    const bx = clamp(b.x ?? 0, 0, 100);
    const by = clamp(b.y ?? 0, 0, 100);
    const bw = clamp(b.w ?? 20, 1, 100 - bx);
    const bh = clamp(b.h ?? 10, 1, 100 - by);
    const x = Math.round(bx * vbW / 100);
    const y = Math.round(by * vbH / 100);
    const w = Math.round(bw * vbW / 100);
    const h = Math.round(bh * vbH / 100);
    const fill = b.type === 'product' ? '#FFFFFF'
               : b.type === 'cta' ? accent
               : b.type === 'decor' ? 'rgba(97,208,223,.2)'
               : b.type === 'badge' ? '#FFF8E6'
               : '#E8EBEE';
    const stroke = b.type === 'product' ? '#D8DEE3' : 'none';
    const txt = b.label || b.type || '';
    const txtColor = b.type === 'cta' ? '#FFFFFF' : dark;
    const fontSize = b.type === 'title' ? 14 : b.type === 'subtitle' ? 11 : 10;
    const fontWeight = b.type === 'title' ? 700 : 500;
    return `<g>
      <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
      <text x="${x + w/2}" y="${y + h/2 + fontSize/3}" text-anchor="middle" fill="${txtColor}" font-family="Noto Sans TC, sans-serif" font-size="${fontSize}" font-weight="${fontWeight}">${escapeXml(txt)}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${vbW}" height="${vbH}" fill="${bg}"/>
    ${blocks}
  </svg>`;
}

function copyText(text, successMsg='已複製'){
  navigator.clipboard.writeText(text).then(() => showToast(successMsg));
}

function renderProposals(proposals, canvasW, canvasH){
  const grid = $('#proposals');
  grid.innerHTML = '';
  $('#results-label').style.display = 'block';

  proposals.forEach((p, i) => {
    const tag = String.fromCharCode(65 + i);
    const card = document.createElement('div');
    card.className = 'proposal';

    const paletteHtml = (p.palette || []).map(hex =>
      `<div class="p-swatch" style="background:${hex};" data-hex="${hex}" title="點擊複製 ${hex}"></div>`
    ).join('');

    card.innerHTML = `
      <div class="p-head">
        <span class="p-tag">方案 ${tag}</span>
      </div>
      <div class="p-name">${escapeXml(p.name || `方案 ${tag}`)}</div>
      <div class="p-oneliner">${escapeXml(p.oneliner || '')}</div>
      <div class="wireframe">${renderWireframe(p, canvasW, canvasH)}</div>

      <div class="p-block">
        <div class="label">主標題</div>
        <div class="content">${escapeXml(p.headline || '')}</div>
      </div>

      ${p.subtitle ? `<div class="p-block"><div class="label">副標題</div><div class="content">${escapeXml(p.subtitle)}</div></div>` : ''}
      ${p.cta ? `<div class="p-block"><div class="label">CTA 文字</div><div class="content">${escapeXml(p.cta)}</div></div>` : ''}

      <div class="p-block">
        <div class="label">配色</div>
        <div class="p-palette">${paletteHtml}</div>
      </div>

      ${p.rationale ? `<div class="p-block"><div class="label">設計理由</div><div class="content">${escapeXml(p.rationale)}</div></div>` : ''}

      <div class="p-actions">
        <button class="btn-small" data-copy="all">複製完整方案</button>
        <button class="btn-small" data-copy="headline">複製主標</button>
      </div>
    `;

    card.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', () => {
        const kind = btn.dataset.copy;
        if(kind === 'headline'){
          copyText(p.headline || '', `已複製方案 ${tag} 主標`);
        } else {
          const parts = [
            `【${p.name || `方案 ${tag}`}】`,
            p.oneliner, '',
            `主標題：${p.headline || ''}`,
            p.subtitle ? `副標題：${p.subtitle}` : '',
            p.cta ? `CTA：${p.cta}` : '',
            `配色：${(p.palette || []).join(' / ')}`,
            p.rationale ? `\n設計理由：\n${p.rationale}` : '',
          ].filter(Boolean).join('\n');
          copyText(parts, `已複製方案 ${tag}`);
        }
      });
    });

    card.querySelectorAll('.p-swatch').forEach(sw => {
      sw.addEventListener('click', () => copyText(sw.dataset.hex, `已複製 ${sw.dataset.hex}`));
    });

    grid.appendChild(card);
  });
}

function showLoading(){
  $('#results-label').style.display = 'block';
  $('#proposals').innerHTML = `<div class="state loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <div>AI 正在為你構想 3 個方向…（約 10 秒）</div>
  </div>`;
}

function showError(msg){
  $('#proposals').innerHTML = `<div class="state">⚠ ${escapeXml(msg)}</div>`;
}

async function generate(){
  const state = getFormState();
  if(!state.topic){ showToast('請先填寫活動主題'); return; }

  const size = parsePlatformSize(state.platform);
  showLoading();
  $('#btn-generate').disabled = true;

  const systemPrompt = `你是淨淨美學工作室的資深視覺設計師，專門為淨淨品牌設計行銷素材。

【淨淨品牌規範】
- 品牌色：青綠 #61D0DF（主色）、#329BAF（深青）、#EBF9FC（淺青底）、#F5EDE3（暖米）、#F0D9D9（腮紅粉）
- 調性：淺色淡雅、白底為主、不做深色 dashboard
- 字體：中文 Noto Sans TC、英文 Inter
- 品牌精神：以家人標準開發、安心清潔、真誠溫暖（不煽情、不過度承諾）
- 避免：重口味、繁複、壓迫感、暗色系

【你的任務】
根據使用者輸入，產出 **3 個風格明顯不同** 的排版方案。每個方案要能讓設計師直接進 Figma 開始做稿。

【輸出格式】嚴格回傳 JSON，不要 markdown code fence。schema：
{
  "proposals": [
    {
      "name": "方案名稱（5-10 字，有記憶點）",
      "oneliner": "一句話說明方向（15-25 字）",
      "headline": "主標題實際文案（繁中，符合調性）",
      "subtitle": "副標題（可省略）",
      "cta": "CTA 按鈕文字（可省略）",
      "palette": ["#主色", "#輔色", "#文字色"],
      "blocks": [
        { "type": "title", "label": "主標文字", "x": 5, "y": 15, "w": 50, "h": 18 },
        { "type": "subtitle", "label": "副標", "x": 5, "y": 36, "w": 45, "h": 10 },
        { "type": "product", "label": "產品圖", "x": 60, "y": 10, "w": 35, "h": 70 },
        { "type": "cta", "label": "立即選購", "x": 5, "y": 70, "w": 22, "h": 12 },
        { "type": "decor", "label": "裝飾元素", "x": 50, "y": 0, "w": 50, "h": 8 }
      ],
      "rationale": "為什麼這個方向有效（2-3 句，講目標客群感受）"
    }
  ]
}

【blocks 座標規範】
- x, y, w, h 皆為 0–100 的百分比（相對於畫布）
- type 僅限：title / subtitle / product / cta / decor / logo / badge
- 配合「目標版位比例」：橫幅要左右分佈、方形要上下分層、9:16 限動要垂直優先

【三個方案的差異要明顯】
例：A 走「產品擺中央、文案極簡」、B 走「左文右圖、重節奏」、C 走「全圖滿版、文字疊圖上」。不要三個都類似。

【語言】一律繁體中文台灣用語，不可用簡體字。`;

  const userMsg = `活動主題：${state.topic}
目標版位：${state.platform}（畫布 ${size.w}×${size.h}、比例 ${(size.w/size.h).toFixed(2)}）
調性：${state.tone}
必放元素：${state.mustHave || '（設計師自行判斷）'}
補充需求：${state.extra || '（無）'}

請產出 3 個方案。`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt,
        messages: [{ role: 'user', content: userMsg }],
        stream: false,
        maxTokens: 1800,
      }),
    });
    const data = await res.json();
    if(!res.ok || data.error){
      showError(`${data.error || '生成失敗'}${data.hint ? '｜' + data.hint : ''}`);
      return;
    }

    let reply = (data.reply || '').trim();
    // 剝除可能的 markdown code fence
    reply = reply.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
    // 如果 AI 在 JSON 前後夾話，擷取第一個 { 到最後一個 } 之間
    const firstBrace = reply.indexOf('{');
    const lastBrace = reply.lastIndexOf('}');
    if (firstBrace !== -1 && lastBrace > firstBrace) {
      reply = reply.slice(firstBrace, lastBrace + 1);
    }

    let parsed;
    try { parsed = JSON.parse(reply); }
    catch(e){
      showError('AI 回應格式無法解析，請再試一次。');
      console.error('[layout] parse fail', reply);
      return;
    }
    const proposals = (parsed.proposals || []).slice(0, 3);
    if(proposals.length === 0){ showError('AI 沒有產出方案，請調整輸入再試'); return; }

    window.__ccCurrentProposals = { state, proposals };
    renderProposals(proposals, size.w, size.h);
  } catch(e){
    showError('連線失敗：' + e.message);
  } finally {
    $('#btn-generate').disabled = false;
  }
}

$('#btn-generate').addEventListener('click', generate);
$('#btn-reset').addEventListener('click', () => {
  $('#topic').value = '';
  $('#must-have').value = '';
  $('#extra').value = '';
  $('#proposals').innerHTML = '';
  $('#results-label').style.display = 'none';
  window.__ccCurrentProposals = null;
});
</script>

<!-- 淨淨 AI 對話面板 -->
<script src="assets/chat-panel.js"></script>
<script>
CCChatPanel.init({
  toolName: '排版建議小幫手',
  systemPrompt: '你是淨淨美學工作室的 AI 設計助理，專門協助使用者打磨「排版建議小幫手」產出的方案。淨淨品牌調性：淺色淡雅、teal 青綠 #61D0DF、Noto Sans TC + Inter、以家人標準開發。請用繁體中文，回答精簡（最多 3 段），給具體可執行的微調建議。若使用者問到「方案 A/B/C」，從當前方案 context 對應回覆。',
  greeting: '嗨！我是排版建議小幫手的 AI 助理。\n覺得哪個方案可以再調？告訴我「方案 A 標題太長」「方案 B 改成暖色」這類具體想法，我幫你想怎麼改 ✨',
  suggestions: ['方案 A 標題縮短', '方案 B 加個 CTA', '三個都換暖色', '配色太淡，加強對比'],
  dailyLimit: 30,
  getContext: () => {
    const s = window.__ccCurrentProposals;
    if(!s) return { note: '使用者尚未生成方案' };
    const notes = [
      `活動主題：${s.state.topic}`,
      `版位：${s.state.platform}`,
      `調性：${s.state.tone}`,
      s.state.mustHave ? `必放元素：${s.state.mustHave}` : null,
      '',
      '【當前 3 個方案】',
      ...s.proposals.map((p, i) => {
        const tag = String.fromCharCode(65 + i);
        return `方案 ${tag}「${p.name}」：${p.oneliner}\n  主標「${p.headline}」｜CTA「${p.cta||'無'}」｜配色 ${(p.palette||[]).join(' / ')}`;
      }),
    ].filter(x => x !== null).join('\n');
    return { note: notes };
  },
});
</script>
