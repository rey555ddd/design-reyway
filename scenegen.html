<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챈혘혚책짖혘챌혚짠챌혬혺챈혞혨책혲짢 | 챈쨌짢챈쨌짢챌쩐혦책짯쨍책쨌짜채쩍혵책짰짚</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #61D0DF;
            --teal-d: #329BAF;
            --dark: #1E2230;
            --text: #2D3142;
            --gray: #8C8C8C;
            --amber: #B8860B;
            --amber-bg: #FFF8E6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: var(--text);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 48px 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #F0F0F0;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
            display: block;
        }

        .badge {
            display: inline-block;
            background-color: var(--amber-bg);
            color: var(--amber);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .button {
            display: inline-block;
            background-color: var(--teal);
            color: #FFFFFF;
            padding: 12px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .button:hover {
            background-color: var(--teal-d);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .icon {
                font-size: 48px;
            }

            .button {
                padding: 10px 28px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <span class="icon">챨혺혫쨍</span>
            <span class="badge">챕혯혢챌혲쩌채쨍짯</span>
            <h1>챈혘혚책짖혘챌혚짠챌혬혺챈혞혨책혲짢</h1>
            <p class="description">AI 챌혬혺챈혞혨챌혬짖책혫혖채쩍쩔챌혬짢책혻쨈챈혲짱챌혚짠챌혟혝챦쩌혣챕혯혢챌혲쩌채쨍짯</p>
            <a href="index.html" class="button">챔쩔혬책혴혷책쨌짜채쩍혵책짰짚</a>
        </div>
    </div>
</body>
</html>
