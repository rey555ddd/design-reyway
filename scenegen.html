<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情境照生成器 — 淨淨美學工作室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css">
<style>
.page-header{
  background:linear-gradient(135deg,var(--teal-xl) 0%,var(--white) 40%,var(--white) 60%,var(--teal-l) 100%);
  padding:40px 40px 32px;border-bottom:1px solid #EEF0F2;
}
.page-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.page-title{display:flex;align-items:center;gap:16px;}
.page-title .logo{
  width:48px;height:48px;border-radius:14px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:20px;
  box-shadow:0 4px 16px rgba(97,208,223,.3);
}
.page-title h1{font-size:24px;font-weight:900;color:var(--dark);}
.page-title .subtitle{font-size:13px;color:var(--gray);margin-top:2px;}
.back-link{
  font-size:13px;color:var(--gray);text-decoration:none;
  padding:8px 14px;border-radius:var(--radius-s);border:1px solid #EEF0F2;
  transition:all .2s;
}
.back-link:hover{color:var(--teal-d);border-color:var(--teal);}

.main{max-width:1200px;margin:0 auto;padding:32px 40px 80px;}

.cost-note{
  background:#FFF8E6;border:1px solid #F3E6B8;color:#8a6d1a;
  padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}
.cost-note strong{color:#6b5314;}

.form-card{background:var(--white);border:1px solid #EEF0F2;border-radius:var(--radius);padding:28px;margin-bottom:28px;}
.section-label{font-size:13px;font-weight:700;color:var(--teal-d);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;padding-left:4px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:13px;font-weight:700;color:var(--dark);}
.form-field .hint{font-size:11px;color:var(--gray);}
.form-field input[type=text],
.form-field textarea,
.form-field select{
  font-family:inherit;font-size:14px;color:var(--text);
  padding:10px 12px;border:1px solid #E1E5E8;border-radius:10px;
  background:var(--white);outline:none;transition:border-color .2s;
}
.form-field input[type=text]:focus,
.form-field textarea:focus,
.form-field select:focus{border-color:var(--teal);}
.form-field textarea{min-height:72px;resize:vertical;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  font-size:13px;padding:7px 14px;border-radius:20px;
  background:var(--light-gray);border:1px solid #EEF0F2;color:var(--text);
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.chip:hover{border-color:var(--teal);color:var(--teal-d);}
.chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}

.form-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid #EEF0F2;flex-wrap:wrap;}
.cost-est{font-size:12px;color:var(--gray);}
.cost-est strong{color:var(--teal-d);font-family:'Inter',monospace;}
.action-buttons{display:flex;gap:10px;}
.btn{background:var(--white);border:1px solid #EEF0F2;color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn:hover{border-color:var(--teal);color:var(--teal-d);}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700;}
.btn.primary:hover{background:var(--teal-d);border-color:var(--teal-d);color:#fff;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.result-card{
  background:var(--white);border:1px solid #EEF0F2;border-radius:var(--radius);
  padding:16px;display:flex;flex-direction:column;gap:12px;
}
.result-img{
  background:#F4F6F8;border-radius:var(--radius-s);overflow:hidden;
  aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
}
.result-img.portrait{aspect-ratio:2/3;}
.result-img.landscape{aspect-ratio:3/2;}
.result-img img{width:100%;height:100%;object-fit:cover;display:block;}
.result-meta{font-size:12px;color:var(--gray);line-height:1.5;}
.result-actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap;}
.btn-small{font-size:12px;padding:6px 12px;border-radius:8px;background:var(--white);border:1px solid #EEF0F2;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-small:hover{border-color:var(--teal);color:var(--teal-d);}
.btn-small.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-small.primary:hover{background:var(--teal-d);color:#fff;}
.btn-small.accent{background:#FFF8E6;border-color:#F3E6B8;color:#8a6d1a;}
.btn-small.accent:hover{background:#F3E6B8;}

.edit-block{
  background:var(--teal-xl);border:1px solid var(--teal-l);
  border-radius:var(--radius-s);padding:12px;display:none;
  display:flex;flex-direction:column;gap:8px;
}
.edit-block.on{display:flex;}
.edit-block textarea{
  font-family:inherit;font-size:13px;color:var(--text);
  border:1px solid #E1E5E8;border-radius:8px;padding:8px 10px;
  background:#fff;outline:none;min-height:56px;resize:vertical;
}
.edit-block textarea:focus{border-color:var(--teal);}
.edit-suggestions{display:flex;flex-wrap:wrap;gap:6px;}
.edit-suggestions button{
  font-size:11px;padding:4px 10px;border-radius:12px;
  background:#fff;border:1px solid var(--teal-l);color:var(--teal-d);
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.edit-suggestions button:hover{background:var(--teal-l);}
.edit-actions{display:flex;gap:6px;justify-content:flex-end;}
.edit-badge{font-size:10px;color:var(--teal-d);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.edit-spinner{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;color:var(--gray);font-size:12px;}
.edit-spinner .dots span{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:lBounce 1.2s infinite ease-in-out;display:inline-block;margin:0 1px;}
.edit-spinner .dots span:nth-child(2){animation-delay:.15s;}
.edit-spinner .dots span:nth-child(3){animation-delay:.3s;}

.state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray);font-size:14px;}
.state.loading{display:flex;flex-direction:column;align-items:center;gap:12px;}
.state .dots{display:flex;gap:6px;}
.state .dots span{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:lBounce 1.2s infinite ease-in-out;}
.state .dots span:nth-child(2){animation-delay:.15s;}
.state .dots span:nth-child(3){animation-delay:.3s;}
@keyframes lBounce{0%,60%,100%{transform:scale(.7);opacity:.4;}30%{transform:scale(1);opacity:1;}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:1000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:680px){
  .page-header{padding:24px 20px;}
  .main{padding:24px 20px 60px;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="page-header">
  <div class="page-header-inner">
    <div class="page-title">
      <div class="logo">淨</div>
      <div>
        <h1>情境照生成器</h1>
        <div class="subtitle">選產品、選場景、選光線 → AI 合成淨淨情境照</div>
      </div>
    </div>
    <a href="index.html" class="back-link">← 返回工作室</a>
  </div>
</header>

<main class="main">

  <div class="cost-note">
    <span>💡</span>
    <span><strong>成本提醒</strong>：每張約 <strong>$0.04 USD</strong>（medium 品質），high 品質 <strong>$0.17</strong>。low 品質 <strong>$0.01</strong> 適合試稿。</span>
  </div>

  <div class="form-card">
    <div class="section-label">產品與場景</div>
    <div class="form-grid">

      <div class="form-field full">
        <label>產品 / 主角描述</label>
        <input type="text" id="product" placeholder="例：淨淨椰油洗衣精 2L 大瓶裝、淨淨食器清潔皂、淨淨個人護理組合" value="淨淨椰油洗衣精 2L 大瓶裝">
        <span class="hint">寫清楚「產品名 + 形狀 / 容量」，AI 才畫得像</span>
      </div>

      <div class="form-field">
        <label>場景</label>
        <div class="chip-row" id="scene-row">
          <button type="button" class="chip on" data-v="明亮廚房流理台">廚房流理台</button>
          <button type="button" class="chip" data-v="北歐風格洗手台">洗手台</button>
          <button type="button" class="chip" data-v="乾淨現代浴室">浴室</button>
          <button type="button" class="chip" data-v="陽台洗衣晾曬區">陽台</button>
          <button type="button" class="chip" data-v="嬰兒房柔和角落">嬰兒房</button>
          <button type="button" class="chip" data-v="實木餐桌與早餐">餐桌</button>
          <button type="button" class="chip" data-v="純白攝影棚背景">攝影棚</button>
        </div>
      </div>

      <div class="form-field">
        <label>光線</label>
        <div class="chip-row" id="light-row">
          <button type="button" class="chip on" data-v="柔和自然光、窗邊灑落">自然光</button>
          <button type="button" class="chip" data-v="均勻攝影棚柔光">柔光棚</button>
          <button type="button" class="chip" data-v="清晨溫暖金色光線">晨光</button>
          <button type="button" class="chip" data-v="黃昏暖調夕陽光">夕陽</button>
          <button type="button" class="chip" data-v="純白背光、極簡">白背光</button>
        </div>
      </div>

      <div class="form-field">
        <label>構圖比例</label>
        <div class="chip-row" id="ratio-row">
          <button type="button" class="chip on" data-v="1024x1024" data-label="square">方形 1:1（IG/蝦皮）</button>
          <button type="button" class="chip" data-v="1536x1024" data-label="landscape">橫幅 3:2（Banner）</button>
          <button type="button" class="chip" data-v="1024x1536" data-label="portrait">直幅 2:3（IG 限動）</button>
        </div>
      </div>

      <div class="form-field">
        <label>品質</label>
        <div class="chip-row" id="quality-row">
          <button type="button" class="chip" data-v="low">Low（$0.01）</button>
          <button type="button" class="chip on" data-v="medium">Medium（$0.04）</button>
          <button type="button" class="chip" data-v="high">High（$0.17）</button>
        </div>
      </div>

      <div class="form-field">
        <label>張數</label>
        <div class="chip-row" id="count-row">
          <button type="button" class="chip on" data-v="1">1 張</button>
          <button type="button" class="chip" data-v="2">2 張（比較）</button>
        </div>
      </div>

      <div class="form-field full">
        <label>額外風格提示（選填）</label>
        <textarea id="extra" placeholder="例：加一個木質砧板、畫面帶一點綠色植物、減少雜物、避免出現文字"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <div class="cost-est">預估成本：<strong id="cost-display">$0.04 USD</strong></div>
      <div class="action-buttons">
        <button class="btn" id="btn-reset" type="button">重設</button>
        <button class="btn primary" id="btn-generate" type="button">生成情境照 →</button>
      </div>
    </div>
  </div>

  <div class="section-label" id="results-label" style="display:none;">生成結果</div>
  <div class="results" id="results"></div>

</main>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);

const state = {
  scene: '明亮廚房流理台',
  light: '柔和自然光、窗邊灑落',
  size: '1024x1024',
  ratioLabel: 'square',
  quality: 'medium',
  count: 1,
};

function bindChipGroup(rowId, stateKey, onChange){
  const row = $(rowId);
  row.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    row.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    onChange(c);
  }));
}

bindChipGroup('#scene-row', 'scene', c => state.scene = c.dataset.v);
bindChipGroup('#light-row', 'light', c => state.light = c.dataset.v);
bindChipGroup('#ratio-row', 'size', c => { state.size = c.dataset.v; state.ratioLabel = c.dataset.label; updateCost(); });
bindChipGroup('#quality-row', 'quality', c => { state.quality = c.dataset.v; updateCost(); });
bindChipGroup('#count-row', 'count', c => { state.count = +c.dataset.v; updateCost(); });

const QUALITY_COST = { low: 0.011, medium: 0.042, high: 0.167 };
function updateCost(){
  const per = QUALITY_COST[state.quality] || 0.042;
  const total = (per * state.count).toFixed(3);
  $('#cost-display').textContent = `$${total} USD`;
}
updateCost();

function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

window.__ccCurrentScene = null;

function getPrompt(){
  const product = $('#product').value.trim();
  const extra = $('#extra').value.trim();
  return `高質感商業產品情境照。主體：${product}。場景：${state.scene}。光線：${state.light}。
整體風格：乾淨、明亮、現代感，偏淺色調、白底暖調為主，符合日系北歐風格的生活感。
構圖：產品為畫面主角，清晰置於構圖黃金比例位置，周圍配合少量情境元素（如植物、毛巾、木質托盤）營造使用氛圍，不雜亂。
畫面質感：柔和、舒服、溫暖、真實，不要過度 HDR 或卡通風格。
品牌調性：淨淨 CleanClean，以家人標準開發的清潔產品，訴求安心、天然、日常使用。
避免：文字、Logo、浮誇特效、深色背景、暗沉色調、化學感、工業風。
${extra ? '額外要求：' + extra : ''}`;
}

function showLoading(){
  $('#results-label').style.display = 'block';
  $('#results').innerHTML = `<div class="state loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <div>AI 正在生成情境照…（約 15–40 秒，品質越高越慢）</div>
  </div>`;
}

function showError(msg){
  $('#results').innerHTML = `<div class="state">⚠ ${msg}</div>`;
}

function renderResults(images, prompt){
  const grid = $('#results');
  grid.innerHTML = '';
  $('#results-label').style.display = 'block';
  images.forEach((img, i) => addResultCard(img, prompt, { origin: '初次生成', index: i+1 }));
}

function addResultCard(img, prompt, meta){
  const grid = $('#results');
  const src = img.b64 || img.url;
  if(!src) return;
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-img ${state.ratioLabel}">
      <img src="${src}" alt="情境照">
    </div>
    <div class="result-meta">
      ${meta.origin === '初次生成' ? '' : '<span class="edit-badge">🪄 AI 編修</span> '}
      ${state.size}　${state.quality}　${meta.origin}${meta.index ? ' #'+meta.index : ''}
    </div>
    <div class="result-actions">
      <button class="btn-small primary" data-act="download">下載 PNG</button>
      <button class="btn-small accent" data-act="edit">🪄 AI 編修</button>
      <button class="btn-small" data-act="copy-prompt">複製 prompt</button>
    </div>
    <div class="edit-block" data-edit-block>
      <div style="font-size:11px;color:var(--teal-d);font-weight:700;letter-spacing:1px;">🪄 告訴 AI 你想怎麼改</div>
      <textarea placeholder="例：把背景換成浴室但保留產品、光線再亮一點、加一個木質托盤在左下角、移除右上角的植物"></textarea>
      <div class="edit-suggestions">
        <button type="button" data-sug="光線再亮一點">光線再亮一點</button>
        <button type="button" data-sug="背景換成洗手台">背景換成洗手台</button>
        <button type="button" data-sug="產品再大一些、放畫面中央">產品再大一些、放畫面中央</button>
        <button type="button" data-sug="加一些綠色植物裝飾">加綠植裝飾</button>
        <button type="button" data-sug="畫面太雜，減少裝飾物">畫面太雜</button>
        <button type="button" data-sug="色調改成暖色系">改暖色系</button>
      </div>
      <div class="edit-actions">
        <button type="button" class="btn-small" data-act="edit-cancel">取消</button>
        <button type="button" class="btn-small primary" data-act="edit-submit">送出編修（$${QUALITY_COST[state.quality].toFixed(3)}）</button>
      </div>
    </div>
  `;

  card.querySelector('[data-act=download]').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = src;
    a.download = `cleanclean-scene-${Date.now()}.png`;
    a.click();
  });
  card.querySelector('[data-act=copy-prompt]').addEventListener('click', () => {
    navigator.clipboard.writeText(prompt).then(() => showToast('已複製 prompt'));
  });

  const editBlock = card.querySelector('[data-edit-block]');
  const editTextarea = editBlock.querySelector('textarea');
  card.querySelector('[data-act=edit]').addEventListener('click', () => {
    editBlock.classList.toggle('on');
    if(editBlock.classList.contains('on')) setTimeout(() => editTextarea.focus(), 50);
  });
  card.querySelector('[data-act=edit-cancel]').addEventListener('click', () => {
    editBlock.classList.remove('on');
  });
  editBlock.querySelectorAll('[data-sug]').forEach(btn => {
    btn.addEventListener('click', () => { editTextarea.value = btn.dataset.sug; editTextarea.focus(); });
  });
  card.querySelector('[data-act=edit-submit]').addEventListener('click', async () => {
    const editPrompt = editTextarea.value.trim();
    if(!editPrompt){ showToast('請先描述要怎麼改'); return; }

    // 禁用按鈕、顯示 spinner
    const submitBtn = card.querySelector('[data-act=edit-submit]');
    const origText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = '生成中…';
    editBlock.insertAdjacentHTML('beforeend',
      `<div class="edit-spinner" data-editing><span>AI 正在編修…（約 15-40 秒）</span>
        <span class="dots"><span></span><span></span><span></span></span></div>`);
    const spinner = editBlock.querySelector('[data-editing]');

    const fullPrompt = `基於此圖進行編修：${editPrompt}

要求：保留原圖的整體構圖與主體產品，只做指定修改。維持淨淨品牌調性（淺色淡雅、乾淨、生活感、不卡通化、不深色）。`;

    try {
      const res = await fetch('/api/image-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: src,
          prompt: fullPrompt,
          size: state.size,
          quality: state.quality,
          n: 1,
        }),
      });
      const data = await res.json();
      if(!res.ok || data.error){
        showToast(`⚠ ${data.error || '編修失敗'}${data.hint ? '｜' + data.hint : ''}`);
        return;
      }
      const newImages = data.images || [];
      if(newImages.length === 0){ showToast('沒收到編修後的圖'); return; }

      // 把編修結果加到 grid 最前面，讓使用者看到對比
      const newImg = newImages[0];
      const newSrc = newImg.b64 || newImg.url;
      if(newSrc){
        // 建立新卡並插到當前卡後面，保持比較視覺
        const tempDiv = document.createElement('div');
        grid.insertBefore(tempDiv, card.nextSibling);
        tempDiv.remove();
        addResultCard(newImg, fullPrompt, { origin: `編修自「${editPrompt.slice(0,20)}${editPrompt.length>20?'…':''}」` });
        // 把新加的卡片移到緊接在原卡後
        const cards = Array.from(grid.children);
        const newCard = cards[cards.length - 1];
        grid.insertBefore(newCard, card.nextSibling);
        newCard.scrollIntoView({ behavior:'smooth', block:'nearest' });
        showToast('編修完成 ✓');

        // 關閉原卡的編修框
        editBlock.classList.remove('on');
        editTextarea.value = '';
      }
    } catch(e){
      showToast('連線失敗：' + e.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = origText;
      if(spinner) spinner.remove();
    }
  });

  grid.appendChild(card);
}

async function generate(){
  const product = $('#product').value.trim();
  if(!product){ showToast('請先填寫產品描述'); return; }

  const prompt = getPrompt();
  showLoading();
  $('#btn-generate').disabled = true;

  try {
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        size: state.size,
        quality: state.quality,
        n: state.count,
      }),
    });
    const data = await res.json();
    if(!res.ok || data.error){
      showError(`${data.error || '生成失敗'}${data.hint ? '｜' + data.hint : ''}`);
      return;
    }
    const images = data.images || [];
    if(images.length === 0){ showError('沒有收到圖片'); return; }

    window.__ccCurrentScene = {
      product, scene: state.scene, light: state.light,
      ratio: state.ratioLabel, quality: state.quality,
      prompt, firstImage: images[0].b64 || images[0].url,
    };

    renderResults(images, prompt);
  } catch(e){
    showError('連線失敗：' + e.message);
  } finally {
    $('#btn-generate').disabled = false;
  }
}

$('#btn-generate').addEventListener('click', generate);
$('#btn-reset').addEventListener('click', () => {
  $('#product').value = '';
  $('#extra').value = '';
  $('#results').innerHTML = '';
  $('#results-label').style.display = 'none';
  window.__ccCurrentScene = null;
});
</script>
